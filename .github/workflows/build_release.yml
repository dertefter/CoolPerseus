name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleRelease

      - name: Prepare Magisk Module
        run: |
          mkdir -p magisk_module_tmp/system/priv-app/DeviceSettings
          mkdir -p magisk_module_tmp/system/priv-app/CoolPerseus
          cp module.prop magisk_module_tmp/
          cp service.sh magisk_module_tmp/
          cp keyhandler/build/outputs/apk/release/keyhandler-release.apk magisk_module_tmp/system/priv-app/DeviceSettings/DeviceSettings.apk
          cp coolperseus/build/outputs/apk/release/coolperseus-release.apk magisk_module_tmp/system/priv-app/CoolPerseus/CoolPerseus.apk
          cd magisk_module_tmp
          zip -r ../CoolPerseus_Magisk.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            CoolPerseus_Magisk.zip
            keyhandler/build/outputs/apk/release/keyhandler-release.apk
            coolperseus/build/outputs/apk/release/coolperseus-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
